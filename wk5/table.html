<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <link rel="stylesheet" href="table.css"
</head>
<body>
    <h1 style="text-align: center;">Favorite food</h1>
    <hr>
    <br>
    <table>
        <thead>
            <tr>
                <td>food</td>
                <td>rating</td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>crispy chipotle chicken wrap</td>
                <td>9/10</td>    
            </tr>
            <tr>
                <td>ham and swiss croissant</td>
                <td>100/10</td>
            </tr>
            <tr>
                <td>flan</td>
                <td>100000/10</td>
            </tr>
            <tr>
                <td>grilled chicken ceaser wrap</td>
                <td>tbd/10</td>
            </tr>
            <tr>
                <td>grilled cheese</td>
                <td>7/10</td>
            </tr>
            <tr>
                <td>lindas chocolate cake</td>
                <td>NEED</td>
            </tr>
        </tbody>
    </table>

    <br>
    <h2>form example</h2>

    <form action="#" method="post">
        <input type="text" name="username" placeholder="enter user">
        <br>
        <input type="text" name="username" placeholder="enter password">
        <br>
        <input type="button" name="abutton" value="click">
    </form>

    <form action="#" method="get">
        <table>
            <!-- defining tabe -->
             <thead>
                <tr>
                    <td>label</td>
                    <td>input</td>
                </tr>
             </thead>
             <!-- defining alot of input types -->
             <tbody>
<!-- text input -->
                <tr>
                    <td>text input</td>
                    <td><input type="text"></td>
                </tr>
<!-- checkbox -->
                <tr>
                    <td>checkbox</td>
                    <td><input type="checkbox"></td>
                </tr>
<!-- color -->
                <tr>
                    <td>color</td>
                    <td><input type="color"></td>
                </tr>
<!-- date -->
                <tr>
                    <td>date</td>
                    <td><input type="date"></td>
                </tr>
<!-- file -->
                <tr>
                    <td>file</td>
                    <td><input type="file"></td>
                </tr>
<!-- time -->
                <tr>
                    <td>time</td>
                    <td><input type="time"></td>
                </tr>
<!-- radio button -->
                <tr>
                    <td>radio button</td>
                    <td>
                        <label for="yes">yes</label>
                        <input type="radio" name="yesorno" value="yes" id="yes">
                        <br>
                        <label for="no">no</label>
                        <input type="radio" name="yesorno" value="no" id="no">
                    </td>
                </tr>

                <tr>
                    <td><textarea name="textarea" cols="30" rows="10" placeholder="enter your name"></textarea>
                    </td>
                </tr>


             </tbody>
        </table>
    </form>
    
</body>
</html>
