<!DOCTYPE html>
<html lang="en">
<head>
    <!--The type of font we are using-->
    <meta charset="UTF-8">
    <!--Tells the -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Kendry Duran">
    <meta name="description" content="Default HTML Page for SE 111">
    
    <link type="text/css" rel="stylesheet" href="style.css">

    <title>Week 5 | Tables and Forms</title>
</head>
<body>
    <!--Build your Table and Form here-->
<form action="confirm.html" method="get">
    <h1>Birthday Party Registration Form</h1>
    <table>
        <thead>
            <tr>
                <td><b>Labels</b></td>
                <td><b>Form Fields</b></td>
            </tr>
        </thead>
        <tbody>
            <!-- Parent Gaurdian name -->
            <tr>
                <td><label for="gfirst">Parent/Guardian Name</label></td>
                <td><input type="text" name="gfirst" id="gfirst" placeholder="First Name" maxlength="20" required>
                    <br>
                <input type="text" name="glast" id="glast" placeholder="Last Name" maxlength="20" required></td>
            </tr>
            <!-- Childs first name -->
            <tr>
                <td><label for="cfirst">Child's First Name</label></td>
                <td><input type="text" name="cfirst" id="cfirst" placeholder="Child's First Name" required> </td>
            </tr>
            <!-- Childs age -->
            <tr>
                <td><label for="age">Child's Age</label></td>
                <td><input type="number" name="age" id="age" value="3" required></td>
            </tr>
            
            <tr>
                <td><h2>Date and Time</h2></td>
                <td></td>
            </tr>

            <tr>
                <td><label for="date">Date</label></td>
                <td><input type="date" name="date" id="date" required> </td>
            </tr>

            <tr>
                <td><label for="time">Start Time</label></td>
                <td><input type="time" name="time" id="time" required></td>
            </tr>

            <tr>
                <td><label for="guests">Number of Guests</label></td>
                <td><input type="number" name="guests" value="5"</td>
            </tr>

            <tr>
                <td><h2>Food</h2></td>
                <td></td>
            </tr>

            <tr>
                <td><label for="size">Size</label></td>
                <td>
                    <input type="radio" name="size"  id="sm"><label>sm</label>

                    <input type="radio" name="size"  id="md"><label>md</label>

                    <input type="radio" name="size"  id="lg"><label>lg</label>
                </td>
            <tr>

            <tr>
                <td>Drinks</td>
                <td>
                    <input type="checkbox" name="drink1" id="drink1" checked value="coke"><label for="drink1">Coke</label><br>

                    <input type="checkbox" name="drink2" id="drink2" value="sprite"><label for="drink2">Sprite</label><br>

                    <input type="checkbox" name="drink3" id="drink3" value="fruitpunch"><label for="drink3">Fruit Punch</label><br>

                    <input type="checkbox" name="drink4" id="drink4" value="lemonade"><label for="drnk4">Lemonade</label><br>

                    <input type="checkbox" name="drink5" id="drink5" value="icedtea"> <label for="drink5">Iced Tea</label>
                    
                </td>
            </tr>

            <tr>
                <td><label for="cake">Cake</label></td>
                <td><select name="cake" id="cake">
                    <option>Chocolate Cake</option>
                    
                    <option selected>Vanilla</option>
                    
                    <option>I'll bring my own cake</option>
                </select></td>
            </tr>

            <tr>
                <td><h2>Decorations</h2></td>
                <td></td>
            </tr>

            <tr>
                <td><label for="colors">Color Scheme</label></td>
                <td>Choose a color scheme for the party<br><input type="color" name="color" id="color"></td>
            </tr>

            <tr>
                <td><label for="comments">Additional Comments</label></td>
               <td>
                    <textarea name="comments" id="comments" placeholder="Please add any additional commetns here"></textarea>
                </td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <input type="submit" value="submit">
                </td>
            </tr>
                
        </tbody>
    </table>
</form>
</body>
</html>
